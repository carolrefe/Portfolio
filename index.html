<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Art portfolio — abstract acrylic paintings and mixed-media works.">
    <title>Artwork Portfolio</title>
    <style>
        :root {
            --bg: #fbf9f6;
            --ink: #1e2522;
            --ink-soft: #6a6f6b;
            --line: #e6e1d8;
            --accent: #9a7b52;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        img { display: block; max-width: 100%; }

        .container { display: flex; min-height: 100vh; }

        /* Left sticky info panel */
        .left-panel {
            width: 38%;
            padding: 56px 48px;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--line);
        }
        .left-panel .kicker {
            font-size: 0.75rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 22px;
        }
        .left-panel h1 {
            font-size: clamp(2.2rem, 4vw, 3.4rem);
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: -0.01em;
            margin-bottom: 24px;
        }
        .left-panel .intro {
            color: var(--ink-soft);
            max-width: 34ch;
            margin-bottom: 32px;
        }
        .meta { list-style: none; border-top: 1px solid var(--line); margin-bottom: 32px; }
        .meta li {
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
            font-size: 0.9rem;
            color: var(--ink-soft);
        }
        .meta strong { color: var(--ink); font-weight: 600; }
        .contact-links { display: flex; gap: 20px; flex-wrap: wrap; }
        .contact-links a {
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink);
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 2px;
            transition: color 0.25s;
        }
        .contact-links a:hover { color: var(--accent); }
        .count { margin-top: 26px; font-size: 0.8rem; color: var(--ink-soft); }

        /* Right gallery panel */
        .right-panel { width: 62%; padding: 40px; }
        .gallery {
            column-count: 2;
            column-gap: 20px;
        }
        figure.piece {
            break-inside: avoid;
            margin: 0 0 20px;
            position: relative;
            overflow: hidden;
            border-radius: 3px;
            background: #efeae2;
            cursor: zoom-in;
        }
        figure.piece img {
            width: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        figure.piece:hover img { transform: scale(1.04); }
        figure.piece figcaption {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            padding: 34px 16px 14px;
            color: #fff;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.6));
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s, transform 0.3s;
        }
        figure.piece:hover figcaption { opacity: 1; transform: translateY(0); }

        /* Lightbox */
        .lightbox {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(18, 20, 19, 0.94);
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .lightbox.open { opacity: 1; visibility: visible; }
        .lightbox img { max-width: 88vw; max-height: 82vh; border-radius: 3px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
        .lightbox .caption {
            position: absolute; bottom: 26px; left: 0; right: 0;
            text-align: center; color: #fff; font-size: 1rem; letter-spacing: 0.08em;
        }
        .lb-btn {
            position: absolute; background: none; border: none; color: rgba(255,255,255,0.8);
            cursor: pointer; transition: color 0.25s; user-select: none;
        }
        .lb-btn:hover { color: #fff; }
        .lb-close { top: 22px; right: 30px; font-size: 2.3rem; line-height: 1; }
        .lb-nav { top: 50%; transform: translateY(-50%); font-size: 3rem; padding: 0 22px; }
        .lb-prev { left: 6px; }
        .lb-next { right: 6px; }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .left-panel {
                width: 100%; height: auto; position: relative;
                padding: 64px 32px 40px; border-right: none; border-bottom: 1px solid var(--line);
            }
            .right-panel { width: 100%; padding: 28px 20px; }
        }
        @media (max-width: 560px) {
            .gallery { column-count: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="left-panel">
            <p class="kicker">Contemporary Art</p>
            <h1>Echoes of Form</h1>
            <p class="intro">
                A collection of abstract acrylic paintings and mixed-media works —
                explorations of color, flow and texture, where physical structure
                meets fluid space.
            </p>
            <ul class="meta">
                <li><strong>Medium</strong> — Acrylic &amp; mixed media</li>
                <li><strong>Based in</strong> — Berlin, DE</li>
                <li><strong>Enquiries</strong> — Commissions welcome</li>
            </ul>
            <div class="contact-links">
                <a href="mailto:hello@example.com">Email</a>
                <a href="#" target="_blank" rel="noopener">Instagram</a>
            </div>
            <p class="count" id="count"></p>
        </aside>

        <main class="right-panel">
            <div class="gallery" id="gallery"></div>
        </main>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" aria-hidden="true">
        <button class="lb-btn lb-close" id="lbClose" aria-label="Close">&times;</button>
        <button class="lb-btn lb-nav lb-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
        <img id="lbImg" src="" alt="">
        <button class="lb-btn lb-nav lb-next" id="lbNext" aria-label="Next">&#8250;</button>
        <p class="caption" id="lbCaption"></p>
    </div>

    <script>
        // Titles of the works, in display order. Filenames live in the "Images" folder.
        var TITLES = [
            "Anemone", "Blaue Welle", "Desert", "Dunkelheit", "Erde",
            "Flash 1", "Flash 2", "Flash 3", "Grüne Welle", "Himmel",
            "Il Quadrato", "Il Tondo", "Krokus", "La Linea", "Le Bleu",
            "Le Noir", "Le Rouge", "Licht", "Pastell 1", "Pastell 2",
            "Pastell 3", "Perspektive 1", "Perspektive 2", "Rose",
            "Rote Welle", "Scacco Matto"
        ];

        // Files use mixed extensions/casing; try each until one loads.
        var EXTENSIONS = ["jpg", "jpeg", "JPG", "JPEG", "png", "PNG", "jfif"];

        function makeSrc(title, extIndex) {
            return "Images/" + encodeURIComponent(title) + "." + EXTENSIONS[extIndex];
        }

        var gallery = document.getElementById("gallery");

        TITLES.forEach(function (title, i) {
            var fig = document.createElement("figure");
            fig.className = "piece";
            fig.dataset.index = i;

            var img = document.createElement("img");
            img.loading = "lazy";
            img.alt = title;
            img.dataset.ext = 0;
            img.src = makeSrc(title, 0);
            img.onerror = function () {
                var next = parseInt(img.dataset.ext, 10) + 1;
                if (next < EXTENSIONS.length) {
                    img.dataset.ext = next;
                    img.src = makeSrc(title, next);
                } else {
                    img.onerror = null; // give up silently
                }
            };

            var cap = document.createElement("figcaption");
            cap.textContent = title;

            fig.appendChild(img);
            fig.appendChild(cap);
            gallery.appendChild(fig);
        });

        document.getElementById("count").textContent = TITLES.length + " works";

        /* ---------- Lightbox ---------- */
        var lightbox = document.getElementById("lightbox");
        var lbImg = document.getElementById("lbImg");
        var lbCaption = document.getElementById("lbCaption");
        var current = 0;

        function openLb(index) {
            current = index;
            renderLb();
            lightbox.classList.add("open");
            lightbox.setAttribute("aria-hidden", "false");
            document.body.style.overflow = "hidden";
        }
        function renderLb() {
            var fig = gallery.children[current];
            var img = fig.querySelector("img");
            lbImg.src = img.src;
            lbImg.alt = img.alt;
            lbCaption.textContent = TITLES[current];
        }
        function stepLb(dir) {
            current = (current + dir + TITLES.length) % TITLES.length;
            renderLb();
        }
        function closeLb() {
            lightbox.classList.remove("open");
            lightbox.setAttribute("aria-hidden", "true");
            document.body.style.overflow = "";
        }

        gallery.addEventListener("click", function (e) {
            var fig = e.target.closest("figure.piece");
            if (fig) openLb(parseInt(fig.dataset.index, 10));
        });
        document.getElementById("lbClose").addEventListener("click", closeLb);
        document.getElementById("lbPrev").addEventListener("click", function () { stepLb(-1); });
        document.getElementById("lbNext").addEventListener("click", function () { stepLb(1); });
        lightbox.addEventListener("click", function (e) { if (e.target === lightbox) closeLb(); });
        document.addEventListener("keydown", function (e) {
            if (!lightbox.classList.contains("open")) return;
            if (e.key === "Escape") closeLb();
            if (e.key === "ArrowLeft") stepLb(-1);
            if (e.key === "ArrowRight") stepLb(1);
        });
    </script>
</body>
</html>
