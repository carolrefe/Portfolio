<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: sans-serif;
            background-color: #fbf9f6;
            color: #1e2522;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }
        .left-panel {
            width: 40%;
            padding: 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .right-panel {
            width: 60%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .right-panel img {
            width: 100%;
            height: auto;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .left-panel {
                width: 100%;
                height: auto;
                position: relative;
            }
            .right-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <h1>Echoes of Form</h1>
            <p>2026 &bull; Acrylic &bull; 80 x 60 cm</p>
            <p>This piece explores the intersection of physical structure and fluid spaces.</p>
        </div>
        <div class="right-panel">
            <img src="https://picsum.photos/800/600" alt="Artwork Photo">
        </div>
    </div>

</body>
</html>
